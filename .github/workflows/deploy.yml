name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checar o código
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Configurar .NET
      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      # 3️⃣ Restaurar e publicar
      - name: Restore dependencies
        run: dotnet restore

      - name: Publish project
        run: dotnet publish -c Release -o ./publish

      # 4️⃣ Copiar arquivos para EC2
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "publish/*"
          target: "/home/ubuntu/MentalHealth/bin/Release/net9.0/publish/"

      # 5️⃣ Reiniciar o serviço na EC2
      - name: Restart mentalhealth service
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl daemon-reload
            sudo systemctl restart mentalhealth
            sudo systemctl status mentalhealth --no-pager