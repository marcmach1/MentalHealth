version: '3.8'

services:
  # Aplicação ASP.NET Core
  mentalhealthsupport:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mentalhealthsupport
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    volumes:
      - ./appsettings.Development.json:/app/appsettings.Development.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mentalhealthsupport-network
    depends_on:
      - nginx

  # Nginx como reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - mentalhealthsupport-network
    depends_on:
      - mentalhealthsupport

networks:
  mentalhealthsupport-network:
    driver: bridge
